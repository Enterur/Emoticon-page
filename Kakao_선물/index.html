<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>깜짝 선물 🎁</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.card{
    width:340px;
    background:#fff;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    padding:20px;
    text-align:center;
}
img{
    width:100%;
    border-radius:12px;
}
.sender{
    color:#444;
    margin:15px 0;
    font-size:24px;
    font-weight:bold;
}
button{
    margin-top:20px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#FFD400;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}
button:hover{
    opacity:.9;
}
</style>
</head>
<body>

<div class="card">
    <img src="emoticonplus.png" alt="장난용 이미지">

    <div class="sender">🎉🎁 깜짝 선물! 김민님이 선물을 보냈습니다!</div>

    <p>버튼을 눌러 확인해 보세요.</p>

    <button onclick="gift()">선물 확인하기</button>
</div>

<script>
function gift(){
    document.body.innerHTML = `
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#fff;font-family:sans-serif;">
        <div style="text-align:center;">
            <h1>😂 낚였습니다!</h1>
            <p>실제 이모티콘 플러스는 지급되지 않습니다.</p>
            <p>좋은 하루 보내세요! 😄</p>
        </div>
    </div>`;
}
</script>

</body>
</html>
